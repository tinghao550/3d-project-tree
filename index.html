<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Project Tree</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="loading">
  <div class="spinner"></div>
  <p>加载项目树...</p>
</div>

<div id="hud">
  <div id="breadcrumb"></div>
  <button id="gesture-btn">✋ 手势</button>
</div>

<div id="card-stage">
  <div id="card-container"></div>
</div>

<div id="info-bar">
  <div class="depth" id="depth-indicator">📁 根目录</div>
  <div class="hint" id="hint-text">↑↓ 滚轮选择 · 点击展开 · ESC 返回 · R 回根</div>
</div>

<div id="cam-wrap">
  <video id="cam-video" playsinline muted></video>
  <canvas id="cam-canvas"></canvas>
  <div id="gesture-state">等待手势...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/gestures.js"></script>
</body>
</html>
